server:
  port: 8081

spring:
  profiles:
    active: dev
  application:
    name: system-service
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
      config:
        server-addr: localhost:8848
        file-extension: yml
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/lowcode_platform?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0

# JWT配置
jwt:
  secret: lowcode-platform-jwt-secret-key-must-be-at-least-256-bits-long-for-security
  access-token-expire: 7200      # Access Token有效期（秒）：2小时
  refresh-token-expire: 604800   # Refresh Token有效期（秒）：7天
  header: Authorization
  prefix: "Bearer "
  issuer: lowcode-platform

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.lowcode.platform.system.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

knife4j:
  enable: true
  openapi:
    title: System API
    description: 系统服务接口文档
    version: 1.0.0
    group:
      default:
        group-name: default
        api-rule: package
        api-rule-resources:
          - com.lowcode.platform.system.controller