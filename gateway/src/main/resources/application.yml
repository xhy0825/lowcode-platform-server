server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
      config:
        server-addr: localhost:8848
        file-extension: yml
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        # 系统服务
        - id: system-service
          uri: lb://system-service
          predicates:
            - Path=/api/system/**
          filters:
            - StripPrefix=1
        # 数据服务
        - id: data-service
          uri: lb://data-service
          predicates:
            - Path=/api/data/**
          filters:
            - StripPrefix=1
        # 表单服务
        - id: form-service
          uri: lb://form-service
          predicates:
            - Path=/api/form/**
          filters:
            - StripPrefix=1
        # 流程服务
        - id: flow-service
          uri: lb://flow-service
          predicates:
            - Path=/api/flow/**
          filters:
            - StripPrefix=1
        # 页面服务
        - id: page-service
          uri: lb://page-service
          predicates:
            - Path=/api/page/**
          filters:
            - StripPrefix=1
        # 报表服务
        - id: report-service
          uri: lb://report-service
          predicates:
            - Path=/api/report/**
          filters:
            - StripPrefix=1
        # 文件服务
        - id: file-service
          uri: lb://file-service
          predicates:
            - Path=/api/file/**
          filters:
            - StripPrefix=1

# 安全配置
security:
  ignore:
    urls:
      - /auth/login
      - /auth/captcha
      - /auth/captcha/**
      - /auth/refresh
      - /auth/register
      - /doc.html
      - /webjars/**
      - /swagger-resources/**
      - /v3/api-docs/**