name: Build and Deploy Backend

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build Common modules
      run: mvn clean install -pl common -am -DskipTests

    - name: Build Gateway
      run: mvn package -pl gateway -am -DskipTests

    - name: Build System Service
      run: mvn package -pl system-service/system-core -am -DskipTests

    - name: Build Form Service
      run: mvn package -pl form-service/form-core -am -DskipTests

    - name: Build Flow Service
      run: mvn package -pl flow-service/flow-core -am -DskipTests

    - name: Build Page Service
      run: mvn package -pl page-service/page-core -am -DskipTests

    - name: Build Report Service
      run: mvn package -pl report-service/report-core -am -DskipTests

    - name: Build File Service
      run: mvn package -pl file-service/file-core -am -DskipTests

    - name: Upload Gateway artifact
      uses: actions/upload-artifact@v4
      with:
        name: gateway-jar
        path: gateway/target/*.jar

    - name: Upload System Service artifact
      uses: actions/upload-artifact@v4
      with:
        name: system-jar
        path: system-service/system-core/target/*.jar

    - name: Upload Form Service artifact
      uses: actions/upload-artifact@v4
      with:
        name: form-jar
        path: form-service/form-core/target/*.jar

    - name: Upload Flow Service artifact
      uses: actions/upload-artifact@v4
      with:
        name: flow-jar
        path: flow-service/flow-core/target/*.jar

    - name: Upload Page Service artifact
      uses: actions/upload-artifact@v4
      with:
        name: page-jar
        path: page-service/page-core/target/*.jar

    - name: Upload Report Service artifact
      uses: actions/upload-artifact@v4
      with:
        name: report-jar
        path: report-service/report-core/target/*.jar

    - name: Upload File Service artifact
      uses: actions/upload-artifact@v4
      with:
        name: file-jar
        path: file-service/file-core/target/*.jar

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download Gateway artifact
      uses: actions/download-artifact@v4
      with:
        name: gateway-jar
        path: gateway/target

    - name: Download System Service artifact
      uses: actions/download-artifact@v4
      with:
        name: system-jar
        path: system-service/system-core/target

    - name: Download Form Service artifact
      uses: actions/download-artifact@v4
      with:
        name: form-jar
        path: form-service/form-core/target

    - name: Download Flow Service artifact
      uses: actions/download-artifact@v4
      with:
        name: flow-jar
        path: flow-service/flow-core/target

    - name: Download Page Service artifact
      uses: actions/download-artifact@v4
      with:
        name: page-jar
        path: page-service/page-core/target

    - name: Download Report Service artifact
      uses: actions/download-artifact@v4
      with:
        name: report-jar
        path: report-service/report-core/target

    - name: Download File Service artifact
      uses: actions/download-artifact@v4
      with:
        name: file-jar
        path: file-service/file-core/target

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Gateway
      uses: docker/build-push-action@v5
      with:
        context: ./gateway
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/lowcode-gateway:latest

    - name: Build and push System Service
      uses: docker/build-push-action@v5
      with:
        context: ./system-service/system-core
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/lowcode-system:latest

    - name: Build and push Form Service
      uses: docker/build-push-action@v5
      with:
        context: ./form-service/form-core
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/lowcode-form:latest

    - name: Build and push Flow Service
      uses: docker/build-push-action@v5
      with:
        context: ./flow-service/flow-core
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/lowcode-flow:latest

    - name: Build and push Page Service
      uses: docker/build-push-action@v5
      with:
        context: ./page-service/page-core
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/lowcode-page:latest

    - name: Build and push Report Service
      uses: docker/build-push-action@v5
      with:
        context: ./report-service/report-core
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/lowcode-report:latest

    - name: Build and push File Service
      uses: docker/build-push-action@v5
      with:
        context: ./file-service/file-core
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/lowcode-file:latest