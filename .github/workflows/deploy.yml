name: Build and Deploy Backend

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn clean package -DskipTests

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: backend-jars
        path: |
          gateway/target/*.jar
          system-service/system-core/target/*.jar
          form-service/form-core/target/*.jar
          flow-service/flow-core/target/*.jar

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: backend-jars
        path: artifacts

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Gateway
      uses: docker/build-push-action@v5
      with:
        context: ./gateway
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/lowcode-gateway:latest

    - name: Build and push System Service
      uses: docker/build-push-action@v5
      with:
        context: ./system-service
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/lowcode-system:latest

    - name: Build and push Form Service
      uses: docker/build-push-action@v5
      with:
        context: ./form-service
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/lowcode-form:latest

    - name: Build and push Flow Service
      uses: docker/build-push-action@v5
      with:
        context: ./flow-service
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/lowcode-flow:latest